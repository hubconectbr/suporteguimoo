<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guimoo Support Search</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="top-links">
      <button onclick="openPanel('tutoriais')">Tutoriais</button>
      <button onclick="openPanel('procedimentos')">Procedimentos</button>
      <button onclick="openPanel('indicadores')">Indicadores</button>
      <button onclick="toggleTheme()" id="themeBtn">Modo escuro</button>
    </div>
  </header>

  <main id="home" class="home">
    <section class="search-stage">
      <div class="brand-logo" onclick="goHome()">guimoo</div>
      <p class="sub">Central inteligente de suporte</p>

      <div class="search-box">
        <span class="search-symbol">⌕</span>
        <input id="searchInput" type="search" placeholder="Digite o problema, erro ou dúvida..." autocomplete="off" />
        <span class="shortcut">Ctrl K</span>
      </div>

      <div id="suggestions" class="suggestions"></div>

      <div class="home-actions">
        <button onclick="focusSearch()">Pesquisa Guimoo</button>
        <button onclick="luckySearch()">Estou com sorte</button>
      </div>

      <div id="results" class="results hidden"></div>
    </section>
  </main>

  <section id="articleView" class="article-view hidden">
    <div class="article-top">
      <button class="back" onclick="goHome()">← Voltar</button>
      <div class="mini-search">
        <span>⌕</span>
        <input id="articleSearch" type="search" placeholder="Pesquisar outro problema..." />
      </div>
    </div>

    <div class="article-layout">
      <article id="articleContent" class="article-card"></article>
      <aside id="articleSide" class="side-card"></aside>
    </div>
  </section>

  <section id="panelView" class="panel-view hidden">
    <button class="back" onclick="goHome()">← Voltar</button>
    <div id="panelContent"></div>
  </section>

  <div id="toast" class="toast">Mensagem copiada!</div>
  <script src="js/app.js"></script>
</body>
</html>
